services:
  postgres:
    image: postgres:15-alpine
    container_name: forgetwin_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forge_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forge_secret}
      POSTGRES_DB: ${POSTGRES_DB:-forgetwin_dev}
    ports:
      - "5432:5432"
    volumes:
      - forgetwin_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forge_admin} -d ${POSTGRES_DB:-forgetwin_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - forgetwin_network
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: forgetwin_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-forge_secret}
    ports:
      - "6379:6379"
    volumes:
      - forgetwin_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-forge_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - forgetwin_network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  minio:
    image: minio/minio:latest
    container_name: forgetwin_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-forge_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-forge_secret}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console
    volumes:
      - forgetwin_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - forgetwin_network
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  minio-init:
    image: minio/mc:latest
    container_name: forgetwin_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 ${MINIO_USER:-forge_admin} ${MINIO_PASSWORD:-forge_secret};
      /usr/bin/mc rm -r --force myminio/raw-cad;
      /usr/bin/mc mb myminio/raw-cad || true;
      /usr/bin/mc policy set download myminio/raw-cad;
      /usr/bin/mc mb myminio/processed-meshes || true;
      /usr/bin/mc policy set download myminio/processed-meshes;
      exit 0;
      "
    networks:
      - forgetwin_network

  qdrant:
    image: qdrant/qdrant:v1.8.4
    container_name: forgetwin_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC API
    volumes:
      - forgetwin_qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - forgetwin_network
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

networks:
  forgetwin_network:
    driver: bridge
    name: forgetwin_local_network

volumes:
  forgetwin_pg_data:
  forgetwin_redis_data:
  forgetwin_minio_data:
  forgetwin_qdrant_data:
